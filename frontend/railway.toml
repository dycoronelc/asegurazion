# Configuración del servicio web (Root Directory en Railway: /frontend)
# https://docs.railway.com/reference/config-as-code

[build]
buildCommand = "npm run build"
watchPatterns = ["src/**", "scripts/**", "public/**", "index.html", "vite.config.ts", "package.json", "tailwind.config.js", "postcss.config.js"]

[deploy]
# Escucha en 0.0.0.0 (ver scripts/serve-production.mjs); localhost-only causa 502 en Railway
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 120
